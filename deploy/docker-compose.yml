version: "3.8"

# Simple deployment for pub operators.
# Run: docker compose up -d

services:
  pub-server:
    build:
      context: ..
      dockerfile: packages/pub-server/Dockerfile
    ports:
      - "${PORT:-8080}:8080"
    environment:
      - NODE_ENV=production
      - PORT=8080
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - HUB_URL=${HUB_URL:-https://openpub.ai}
      - HUB_WS_URL=${HUB_WS_URL:-wss://openpub.ai/ws/pub}
      - PUB_ID=${PUB_ID}
      - PUB_CREDENTIAL_ID=${PUB_CREDENTIAL_ID}
      - PUB_CREDENTIAL_SECRET=${PUB_CREDENTIAL_SECRET}
      - LLM_PROVIDER=${LLM_PROVIDER:-openai-compatible}
      - LLM_BASE_URL=${LLM_BASE_URL}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_MODEL=${LLM_MODEL}
      - PUB_MD_PATH=/etc/openpub/PUB.md
      - PUB_SIGNING_PRIVATE_KEY=${PUB_SIGNING_PRIVATE_KEY}
      - PUB_SIGNING_PUBLIC_KEY=${PUB_SIGNING_PUBLIC_KEY}
    volumes:
      - ./PUB.md:/etc/openpub/PUB.md:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
